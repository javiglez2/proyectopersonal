<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benaluma - Mapa de Viajes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estilos/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <header id="menu-superior">
        <h1>Benaluma</h1>

        <div id="menu-usuario" style="display: flex; gap: 15px; align-items: center;">
            <button onclick="togglePanel('panel-disponibles')" class="btn-nav">Viajes Disponibles</button>
            <button onclick="togglePanel('panel-mis-viajes')" class="btn-nav">Mis Viajes</button>

            <div class="perfil-dropdown-container">
                <img id="avatar-menu" onclick="toggleDropdown()"
                    src="https://ui-avatars.com/api/?name=P&background=1d352d&color=fff"
                    style="border-radius: 50%; width: 35px; height: 35px; cursor: pointer; border: 2px solid white;"
                    alt="Perfil">

                <div id="myDropdown" class="dropdown-content">
                    <div class="dropdown-header">
                        <b id="nombre-usuario-menu">Cargando...</b>
                        <small>Usuario Benaluma</small>
                    </div>
                    <a href="perfil.html" class="link-perfil">Mi Perfil</a>
                    <hr>
                    <a href="#" onclick="cerrarSesion()" class="link-cerrar">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main id="contenedor-principal">
        <div id="miMapa"></div>
        <div id="indicador-mapa">
            <p>Toca el mapa para publicar tu viaje</p>
        </div>
    </main>

    <div id="panel-disponibles" class="tarjeta-flotante"
        style="display: block; left: 20px; top: 80px; width: 400px; max-width: 90vw;">
        <div class="cabecera-tarjeta" id="cabecera-disponibles" style="cursor: move;">
            <span>Viajes Disponibles</span>
            <button onclick="togglePanel('panel-disponibles')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>

        <div style="padding: 10px; background: #f9fafb; border-bottom: 1px solid #e5e7eb;">
            <select id="form-categoria"
                style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; background: white; cursor: pointer;">
                <option value="General">General (Cualquier destino)</option>
                <option value="UMA Teatinos">UMA Teatinos</option>
                <option value="UMA El Ejido">UMA El Ejido</option>
                <option value="Centros Antequera/Ronda">Centros Antequera/Ronda</option>
                <option value="PTA (Parque Tecnológico)">PTA (Parque Tecnológico)</option>
                <option value="Grado Superior">Grado Superior (Medac/Cesur/IES)</option>
                <option value="Otros estudios">Otros estudios (Oposiciones/Academias)</option>
            </select>
        </div>

        <div id="lista-viajes" class="cuerpo-tarjeta" style="max-height: 55vh; overflow-y: auto;">
        </div>
    </div>

    <div id="panel-mis-viajes" class="tarjeta-flotante"
        style="display: none; left: 360px; top: 80px; width: 750px; max-width: 90vw;">
        <div class="cabecera-tarjeta" id="cabecera-mis-viajes" style="cursor: move;">
            <span>Mis Viajes</span>
            <button onclick="togglePanel('panel-mis-viajes')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="lista-mis-viajes" class="cuerpo-tarjeta" style="max-height: 60vh; overflow-y: auto;">
        </div>
    </div>

    <div id="panel-publicar" class="tarjeta-flotante"
        style="display: none; right: 20px; top: 80px; width: 400px; max-width: 90vw;">
        <div class="cabecera-tarjeta" id="cabecera-publicar" style="cursor: move;">
            <span>Publicar Viaje</span>
            <button onclick="togglePanel('panel-publicar')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div class="cuerpo-tarjeta">
            <input type="hidden" id="form-lat"><input type="hidden" id="form-lng">

            <div class="campo" style="margin-bottom: 12px;"><label>Origen:</label><input type="text" id="form-origen"
                    style="width: 100%;"></div>
            <div class="campo" style="margin-bottom: 15px;"><label>Destino:</label><input type="text" id="form-destino"
                    style="width: 100%;"></div>

            <div class="campo" style="margin-bottom: 15px;">
                <label>Tipo de Viaje:</label>
                <select id="form-categoria"
                    style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; background: white; cursor: pointer;">
                    <option value="General">General (Cualquier destino)</option>
                    <option value="UMA Teatinos">UMA Teatinos</option>
                    <option value="UMA El Ejido">UMA El Ejido</option>
                    <option value="Centros Antequera/Ronda">Centros Antequera/Ronda</option>
                    <option value="PTA (Parque Tecnológico)">PTA (Parque Tecnológico)</option>
                    <option value="Grado Superior">Grado Superior (Medac/Cesur/IES)</option>
                    <option value="Otros estudios">Otros estudios (Oposiciones/Academias)</option>
                </select>
            </div>

            <div class="campo" style="margin-bottom: 15px;">
                <label>Fecha y Hora:</label>
                <input type="text" id="form-fecha" placeholder="Toca aquí para elegir"
                    style="width: 100%; padding: 12px; background: #ecfdf5; border: 2px solid #10b981; border-radius: 8px; font-weight: bold; text-align: center; color: #047857; cursor: pointer; font-size: 15px;">
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div class="campo" style="flex: 1;"><label>Plazas:</label><input type="number" id="form-plazas"
                        value="3" min="1" max="8" style="width: 100%;"></div>
                <div class="campo" style="flex: 1;"><label>Precio (€):</label><input type="number" id="form-precio"
                        value="1.50" step="0.50" style="width: 100%;"></div>
            </div>

            <button onclick="enviarViajeAlBack()" class="btn-confirmar"
                style="background: #10b981; color: white; width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);">Publicar
                Viaje</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <script src="jscode/index.js?v=5"></script>
</body>

</html>
