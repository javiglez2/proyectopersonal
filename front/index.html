<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benaluma - Mapa de Viajes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estilos/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <header id="menu-superior">
        <h1>Benaluma</h1>

        <div id="menu-usuario" style="display: flex; gap: 15px; align-items: center;">
            <button onclick="togglePanel('panel-disponibles')" class="btn-nav">Viajes Disponibles</button>
            <button onclick="togglePanel('panel-mis-viajes')" class="btn-nav">Mis Viajes</button>

            <div class="perfil-dropdown-container">
                <img id="avatar-menu" onclick="toggleDropdown()" src="https://ui-avatars.com/api/?name=P&background=1d352d&color=fff" style="border-radius: 50%; width: 35px; height: 35px; cursor: pointer; border: 2px solid white;" alt="Perfil">
                
                <div id="myDropdown" class="dropdown-content">
                    <div class="dropdown-header">
                        <b id="nombre-usuario-menu">Cargando...</b>
                        <small>Usuario Benaluma</small>
                    </div>
                    <a href="perfil.html" class="link-perfil">Mi Perfil</a>
                    <hr>
                    <a href="#" onclick="cerrarSesion()" class="link-cerrar">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </header>

    <main id="contenedor-principal">
        <div id="miMapa"></div>
        <div id="indicador-mapa">
            <p>Toca el mapa para publicar tu viaje</p>
        </div>
    </main>

    <div id="panel-disponibles" class="tarjeta-flotante" style="display: block; left: 20px; top: 80px;">
        <div class="cabecera-tarjeta" id="cabecera-disponibles" style="cursor: move;">
            <span>Viajes Disponibles</span>
            <button onclick="togglePanel('panel-disponibles')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="lista-viajes" class="cuerpo-tarjeta" style="max-height: 60vh; overflow-y: auto;">
        </div>
    </div>

    <div id="panel-mis-viajes" class="tarjeta-flotante" style="display: none; left: 360px; top: 80px;">
        <div class="cabecera-tarjeta" id="cabecera-mis-viajes" style="cursor: move;">
            <span>Mis Viajes</span>
            <button onclick="togglePanel('panel-mis-viajes')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="lista-mis-viajes" class="cuerpo-tarjeta" style="max-height: 60vh; overflow-y: auto;">
        </div>
    </div>

    <div id="panel-publicar" class="tarjeta-flotante" style="display: none; right: 20px; top: 80px;">
        <div class="cabecera-tarjeta" id="cabecera-publicar" style="cursor: move;">
            <span>Publicar Viaje</span>
            <button onclick="togglePanel('panel-publicar')" class="btn-cerrar-mini"
                style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div class="cuerpo-tarjeta">
            <input type="hidden" id="form-lat"><input type="hidden" id="form-lng">
            <div class="campo"><label>Origen:</label><input type="text" id="form-origen"></div>
            <div class="campo"><label>Destino:</label><input type="text" id="form-destino"></div>
            <div class="fila-inputs">
                <div class="campo">
                    <label>Fecha:</label>
                    <input type="text" id="form-fecha" placeholder="Toca para elegir fecha y hora">
                </div>
                <div class="fila-inputs">
                    <div class="campo"><label>Plazas:</label><input type="number" id="form-plazas" value="3"></div>
                    <div class="campo"><label>Precio:</label><input type="number" id="form-precio" value="1.50"></div>
                </div>
                <button onclick="enviarViajeAlBack()" class="btn-confirmar">Confirmar</button>
            </div>
        </div>

        <div id="modal-chat"
            style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999999; justify-content: center; align-items: center;">

            <div
                style="background: white; width: 90%; max-width: 450px; height: 80vh; max-height: 600px; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">

                <div
                    style="background: #0c5030; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
                    <b id="chat-titulo" style="font-size: 18px; margin: 0;">💬 Chat</b>
                    <button onclick="cerrarChat()"
                        style="background: none; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
                </div>

                <div id="chat-mensajes"

                    style="flex: 1; padding: 20px; overflow-y: auto; background: #f3f4f6; display: flex; flex-direction: column; gap: 10px;">
                </div>

                <div
                    style="padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="input-mensaje" placeholder="Escribe tu mensaje..."
                        style="flex: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-size: 15px;">
                    <button onclick="enviarMensaje()"
                        style="background: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px;">Enviar</button>
                </div>

            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <script src="jscode/index.js"></script>
</body>

</html>
