<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Gestiona tu perfil de UEQO.">
    <title>UEQO - Mi Perfil</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="estilos/perfil.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
</head>

<body>
    <div class="contenedor-perfil">
        <div class="cabecera-perfil">
            <a href="mapa.html" class="btn-volver">⬅ Volver al Mapa</a>
            <h2>Mi Perfil</h2>
        </div>

        <div class="cuerpo-perfil">
            <div class="avatar-container" onclick="elegirFoto()" title="Haz clic para cambiar tu foto">
                <img id="avatar-grande" src="" alt="Cargando avatar...">
                <input type="file" id="input-archivo-foto" style="display: none;" accept="image/*"
                    onchange="subirFoto(this)">
            </div>

            <form id="form-perfil" onsubmit="event.preventDefault(); alternarEdicion();" autocomplete="on">
                <div class="fila-dos">
                    <div class="form-group">
                        <label for="perfil-nombre">Nombre</label>
                        <input type="text" id="perfil-nombre" name="nombre" autocomplete="given-name" readonly placeholder="Cargando...">
                    </div>
                    <div class="form-group">
                        <label for="perfil-apellidos">Apellidos</label>
                        <input type="text" id="perfil-apellidos" name="apellidos" autocomplete="family-name" readonly placeholder="Cargando...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="perfil-telefono">Teléfono</label>
                    <div class="telefono-row">
                        <input type="tel" id="perfil-telefono" name="telefono" autocomplete="tel" disabled placeholder="Cargando...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="perfil-email">Correo Electrónico</label>
                    <input type="email" id="perfil-email" name="email" autocomplete="email" disabled title="El email no se puede modificar por seguridad">
                </div>

                <div class="form-group" id="grupo-nueva-contrasena" style="display:none;">
                    <label for="perfil-nueva-contrasena">Nueva Contraseña</label>
                    <input type="password" id="perfil-nueva-contrasena" name="nueva-contrasena" autocomplete="new-password" placeholder="Nueva contraseña (opcional)">
                </div>

                <div class="form-group" id="grupo-confirmar-contrasena" style="display:none;">
                    <label for="perfil-confirmar-contrasena">Confirmar Nueva Contraseña</label>
                    <input type="password" id="perfil-confirmar-contrasena" name="confirmar-contrasena" autocomplete="new-password" placeholder="Repite la nueva contraseña">
                </div>

                <div class="acciones-perfil">
                    <button type="submit" id="btn-accion-perfil">Editar Perfil</button>
                    <button type="button" id="btn-cerrar-sesion" onclick="cerrarSesion()" class="btn-peligro">Cerrar Sesión</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/intlTelInput.min.js"></script>
    <script src="jscode/api.js"></script>
    <script src="jscode/perfil.js"></script>
</body>

</html>
