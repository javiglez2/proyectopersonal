<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - IRIGO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body>

    <div class="login-container">
        <div class="brand-header">IRIGO</div>
        
        <h1>¡Bienvenido de nuevo!</h1>
        <p class="form-subtitle">Inicia sesión para buscar o publicar viajes</p>
        
        <form action="/api/login" method="POST">
            
            <label for="email">Tu correo electrónico</label>
            <div class="input-group">
                <input type="email" id="email" name="email" placeholder="tu.email@ejemplo.com" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            
            <label for="password">Contraseña</label>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <button type="submit" class="btn-submit">Entrar a IRIGO</button>
            
        </form>
        
        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </div>
    </div>

</body>
</html>
