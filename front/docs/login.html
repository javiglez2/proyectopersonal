<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en UEQO para buscar o publicar viajes compartidos en Málaga.">
    <meta name="robots" content="noindex, follow">
    <title>Iniciar Sesión - UEQO</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234ade80'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='60' font-weight='900' text-anchor='middle' fill='%23070d0a'%3EU%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="estilos/login.css">
</head>

<body>

    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <a href="index.html" class="btn-volver-inicio">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Volver al inicio
    </a>

    <div class="login-container">

        <div class="brand-header">UEQO</div>
        <h1>¡Bienvenido de nuevo!</h1>
        <p class="form-subtitle">Inicia sesión para buscar o publicar viajes</p>

        <form id="loginForm" novalidate aria-label="Formulario de inicio de sesión">

            <div class="field-wrapper">
                <label for="emailLogin">Correo electrónico</label>
                <div class="input-group">
                    <input type="email" id="emailLogin" placeholder="Tu correo electrónico" autocomplete="email"
                        required aria-required="true" aria-describedby="emailError">
                    <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                </div>
                <span class="error-msg" id="emailError" role="alert" aria-live="polite"></span>
            </div>

            <div class="field-wrapper">
                <label for="contrasenaLogin">Contraseña</label>
                <div class="input-group">
                    <input type="password" id="contrasenaLogin" placeholder="Tu contraseña"
                        autocomplete="current-password" required aria-required="true"
                        aria-describedby="contrasenaError">
                    <i class="fa-solid fa-lock" id="lockIcon" aria-hidden="true"></i>
                    <button type="button" id="togglePassword" aria-label="Mostrar contraseña"
                        style="position:absolute; right:55px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#6b7280; font-size:18px; padding:4px; z-index:2;">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
                <span class="error-msg" id="contrasenaError" role="alert" aria-live="polite"></span>
            </div>

            <div style="display:flex; justify-content:flex-end; margin-bottom:15px;">
                <a href="#" style="color:#16a34a; font-size:14px; font-weight:600; text-decoration:none;">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Entrar a UEQO</button>
        </form>

        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="jscode/login.js"></script>
</body>

</html>
