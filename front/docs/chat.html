<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Chats - UEQO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">
    <link rel="stylesheet" href="estilos/chat.css">
</head>

<body>

    <a href="mapa.html" class="btn-volver-inicio">
        <i class="fa-solid fa-arrow-left"></i> Volver al Mapa
    </a>

    <div class="chat-card">

        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h2>Mis Chats</h2>
            </div>
            <div class="chat-lista" id="lista-conversaciones">
                <p class="cargando" style="text-align:center; padding:20px; color:#8b949e;">Cargando tus chats...</p>
            </div>
        </aside>

        <section class="chat-mensajes-area">
            <div id="chat-header-dinamico" class="chat-header-top" style="display: none;">
                <button type="button" class="btn-volver-chat" onclick="cerrarChatMovil()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h3 id="nombre-chat-actual">Nombre del Chat</h3>
            </div>

            <div id="historial-mensajes" class="mensajes-box">
                <div class="mensaje-bienvenida">
                    <i class="fa-solid fa-comments"></i>
                    <p>Selecciona una conversación para empezar a hablar</p>
                </div>
            </div>

            <form id="form-enviar-mensaje" class="chat-input-area oculto">
                <input type="text" id="input-mensaje" placeholder="Escribe un mensaje..." required>
                <button type="submit" class="btn-enviar"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </section>

    </div>

    <script src="jscode/chat.js"></script>
</body>

</html>
