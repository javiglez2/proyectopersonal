<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Chats - WECKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="estilos/chat.css">
</head>
<body>

    <header class="chat-header">
        <a href="mapa.html" class="btn-volver">
            <i class="fa-solid fa-arrow-left"></i> Volver al Mapa
        </a>
        <div class="logo-wrapper">
            <h2>Mis Chats</h2>
        </div>
    </header>

    <main class="chat-container">
        <aside class="chat-lista" id="lista-conversaciones">
            <p class="cargando">Cargando tus chats...</p>
        </aside>

        <section class="chat-mensajes-area">
            <div id="historial-mensajes" class="mensajes-box">
                <div class="mensaje-bienvenida">
                    <i class="fa-solid fa-comments"></i>
                    <p>Selecciona una conversación para empezar a hablar</p>
                </div>
            </div>
            
            <form id="form-enviar-mensaje" class="chat-input-area oculto">
                <input type="text" id="input-mensaje" placeholder="Escribe un mensaje..." required>
                <button type="submit" class="btn-enviar"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </section>
    </main>

    <script src="jscode/chat.js"></script>
</body>
</html>
