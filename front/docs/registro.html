<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate - UEQO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="estilos/registro.css">
</head>
<body>

    <a href="index.html" class="btn-volver-inicio">
        <i class="fa-solid fa-arrow-left"></i> Volver al inicio
    </a>

    <div class="register-container">
        <div class="brand-header">UEQO</div>
        
        <h1>Crea tu cuenta</h1>
        <p class="form-subtitle">¡Únete a la comunidad y empieza a compartir rutas!</p>
        
        <form id="registro-form">
            
            <div class="row">
                <div class="col">
                    <label for="nombre">Nombre</label>
                    <div class="input-group">
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="col">
                    <label for="apellidos">Apellidos</label>
                    <div class="input-group">
                        <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos" required>
                        <i class="fa-solid fa-users"></i>
                    </div>
                </div>
            </div>
            
            <label for="email">Correo electrónico</label>
            <div class="input-group">
                <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            
            <label for="password">Contraseña</label>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <label for="confirmar-contrasena">Confirmar Contraseña</label>
            <div class="input-group">
                <input type="password" id="confirmar-contrasena" name="confirmar-contrasena" placeholder="Confirma tu contraseña" required>
                <i class="fa-solid fa-lock"></i>
                <span id="error-confirmar" class="error-texto"></span>
            </div>
            
            <button type="submit" class="btn-submit">Registrarme en UEQO</button>
            
        </form>
        
        <div class="footer-links">
            <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    </body>
</html>
